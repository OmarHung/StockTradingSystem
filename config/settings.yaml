# ============================================================
# StockTradingSystem 設定檔
# 可由 WebUI「設定中心」表單化編輯（會保留本註解）。
# ============================================================

# ---- 資料層 ----
data:
  db_path: data/market.db          # SQLite 資料庫位置
  backfill_start: '2020-01-01'     # 歷史回補起始日（近 ~5 年）
  finmind:
    base_url: https://api.finmindtrade.com/api/v4/data
    request_interval_sec: 0.35     # 每次請求間隔（避免觸發頻率限制）
    max_retries: 4

# ---- 股票池篩選（僅做結構性排除；處置股照常納入，僅標記顯示不過濾）----
universe:
  markets:                         # 上市 + 上櫃
    - twse
    - tpex
  include_etf: false               # 是否納入 ETF
  min_stock_id_len: 4              # 一般普通股代號為 4 碼

# ---- 選股 Screener（Phase 1）----
screener:
  top_n: 30                        # 最終選出檔數
  min_avg_turnover: 20000000       # 20 日均成交額下限（元），濾除低流動性
  momentum_lookback:               # 動能回看天數
    - 20
    - 60
  chips_lookback: 20               # 籌碼（法人淨買）回看天數
  weights:                         # 因子權重（會正規化；正值代表越高越好）
    momentum_20: 1
    momentum_60: 0.8
    chips_net_buy: 1.2
    revenue_yoy: 1
    above_ma60: 0.5
capital:
  total: 1000000                   # 總資金（TWD）
risk:
  per_trade_risk_pct: 1.0          # 單筆最大風險（佔總資金 %）
  max_single_position_pct: 15.0    # 單一持股上限 %
  min_reward_risk_ratio: 1.5       # R:R 下限
  cooldown_days: 5                 # 停損後同標的冷卻天數
  max_drawdown_halt_pct: 15.0      # 回撤熔斷門檻 %

# ---- LLM（Phase 2 生效）----
# ---- 券商環境（shioaji）----
shioaji:
  environment: simulation          # simulation=模擬（預設） / production=正式（真金白銀，Phase 5 交易用）

llm:
  analyst_model: claude-opus-4-7
  trader_model: claude-sonnet-4-6
  reflection_model: claude-opus-4-8
  credit_total_usd: 26.93          # Console 儲值總額（USD）；填入後頂部顯示估計剩餘 credit，0=不估算

# ---- 新聞判讀（第四位分析師；只對進入 LLM 深度分析的個股按需抓取，省 FinMind 額度）----
news:
  lookback_days: 10                # 判讀基準日往前抓幾天的新聞
  max_items: 20                    # 餵給 LLM 的新聞上限（新到舊截取）
  scout:                           # 政策題材偵察：掃政策新聞，把題材股補進候選池
    enabled: true
    source: rss                    # rss=免費新聞RSS關鍵字(預設) / web=Claude web search（RSS全掛時自動備援）
    model: claude-sonnet-4-6       # 判讀模型（source=web 時亦需支援 web_search 工具）
    max_candidates: 3              # 每日最多補幾檔（額外名額，不佔量化 top_n）
    keywords:                      # Google News 搜尋關鍵字（可自行增減）
      - 政策 台股
      - 補助 產業
      - 行政院 預算
      - 國防 軍工
      - 電網 台電
      - 法規 鬆綁

# ---- 日誌 ----
logging:
  level: INFO
  dir: logs

# ---- 每日交易主流程 ----
daily:
  top_n: 5                         # 盤後送進 LLM 深度分析的檔數（決策成本 ≈ top_n × 5 次呼叫）

# ---- 通知（每日決策報告推送）----
notify:
  telegram:
    enabled: true                  # Bot Token 與 Chat ID 屬個人資訊，存 .env（TELEGRAM_BOT_TOKEN / TELEGRAM_CHAT_ID）

# ---- 後端內建排程（取代 launchd；WebUI 設定頁可調）----
scheduler:
  intraday:
    enabled: true
    time: "09:00"                  # 盤中停損監控（開盤啟動，收盤/無持倉自行結束）
  dataupdate:
    enabled: true
    time: "14:30"                  # 平日盤後資料增量更新（HH:MM，24h制）
  daily:
    enabled: true
    time: "15:00"                  # 平日交易主流程（撮合→風控→決策→掛單）
